name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rsync to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude node_modules --exclude .next --exclude .git --exclude mcp/node_modules --exclude mcp/dist
          path: ./
          remote_path: /opt/blog/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Build and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/blog
            ADMIN_PASSWORD="@smartz3950" docker compose up -d --build
            docker image prune -f
